version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: campus_work_order_db
    environment:
      POSTGRES_DB: campus_work_order
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: campus_work_order_api
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-postgres123}@postgres:5432/campus_work_order?schema=public
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      JWT_EXPIRES_IN: 7d
      UPLOAD_DIR: /app/uploads
      PORT: 3000
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: campus_work_order_web
    ports:
      - '80:80'
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
  uploads:
